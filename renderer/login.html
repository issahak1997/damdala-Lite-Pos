<!DOCTYPE html>
<html>

<head>
<title>Damdala POS Login</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:url("./assets/mole_park.jpg");
background-size:cover;
background-position:center;
}

.login-box{
background:rgba(0,0,0,0.75);
padding:40px;
border-radius:10px;
text-align:center;
width:300px;
color:white;
}

.login-box h1{
margin-bottom:20px;
}

.login-box input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
}

.login-box button{
width:100%;
padding:12px;
border:none;
background:#00c853;
color:white;
font-weight:bold;
cursor:pointer;
border-radius:5px;
}

.login-box button:hover{
background:#00a844;
}

</style>
</head>

<body>

<div class="login-box">

<h1>Damdala POS</h1>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script src="app.js"></script>

</body>
</html>
