<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Receipt</title>
  <style>
    @page {
      margin: 0;
      size: 80mm auto;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 80mm;
      background: #fff;
      font-family: "Courier New", monospace;
      color: #000;
    }

    body {
      padding: 2mm;
      font-size: 13px;
      line-height: 1.35;
    }

    .receipt {
      width: 100%;
      margin: 0;
      padding: 0;
    }

    .center {
      text-align: center;
    }

    .bold {
      font-weight: bold;
    }

    .store-name {
      font-size: 22px;
      font-weight: bold;
      line-height: 1.15;
      margin-bottom: 4px;
    }

    .store-info {
      font-size: 13px;
      line-height: 1.25;
      margin-bottom: 8px;
    }

    .divider {
      border-top: 1px dashed #000;
      margin: 8px 0;
      width: 100%;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin: 3px 0;
      font-size: 13px;
    }

    .meta-label {
      font-weight: bold;
      min-width: 88px;
    }

    .meta-value {
      flex: 1;
      text-align: right;
      word-break: break-word;
    }

    .item-row {
      display: grid;
      grid-template-columns: 1fr auto auto;
      column-gap: 8px;
      align-items: start;
      margin: 5px 0;
      font-size: 13px;
    }

    .item-name {
      word-break: break-word;
    }

    .item-qty {
      min-width: 24px;
      text-align: center;
    }

    .item-price {
      min-width: 72px;
      text-align: right;
    }

    .total-box {
      margin-top: 8px;
      border-top: 1px dashed #000;
      border-bottom: 1px dashed #000;
      padding: 8px 0;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
    }

    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 13px;
      line-height: 1.3;
    }

    .print-btn {
      width: 100%;
      margin-top: 12px;
      padding: 12px;
      border: none;
      background: #2ecc71;
      color: white;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    @media print {
      html, body {
        width: 80mm;
      }

      .print-btn {
        display: none !important;
      }

      body {
        padding: 1.5mm;
      }
    }
  </style>
</head>
<body>
  <div class="receipt">
    <div class="center">
      <div class="store-name">Damdala Phones and Accessories</div>
      <div class="store-info">
        Opposite Picorna Hotel<br>
        Tamale<br>
        0240386693
      </div>
    </div>

    <div class="divider"></div>

    <div id="info"></div>

    <div class="divider"></div>

    <div id="items"></div>

    <div class="total-box">
      <div class="total-row">
        <span>TOTAL:</span>
        <span id="total">GHS 0.00</span>
      </div>
    </div>

    <div class="footer">
      Thank you for shopping with us
    </div>

    <button class="print-btn" id="printBtn">Print Receipt</button>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    const sale = JSON.parse(localStorage.getItem("receipt") || "null");
    const infoDiv = document.getElementById("info");
    const itemsDiv = document.getElementById("items");
    const totalEl = document.getElementById("total");
    const printBtn = document.getElementById("printBtn");

    if (!sale) {
      infoDiv.innerHTML = "<div>No receipt data found</div>";
      printBtn.disabled = true;
    } else {
      infoDiv.innerHTML = `
        <div class="meta-row">
          <span class="meta-label">Receipt No:</span>
          <span class="meta-value">${escapeHtml(sale.id || "")}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Date:</span>
          <span class="meta-value">${escapeHtml(sale.date || "")}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Cashier:</span>
          <span class="meta-value">${escapeHtml(sale.cashier || "Admin")}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Customer:</span>
          <span class="meta-value">${escapeHtml(sale.customer || "Walk-in")}</span>
        </div>
        <div class="meta-row">
          <span class="meta-label">Payment:</span>
          <span class="meta-value">${escapeHtml(sale.paymentMethod || sale.payment || "Cash")}</span>
        </div>
      `;

      (sale.items || []).forEach((item) => {
        const qty = Number(item.qty || 0);
        const price = Number(item.price || 0);

        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
          <div class="item-name">${escapeHtml(item.name)}</div>
          <div class="item-qty">x${qty}</div>
          <div class="item-price">GHS ${(price * qty).toFixed(2)}</div>
        `;
        itemsDiv.appendChild(row);
      });

      totalEl.innerText = `GHS ${Number(sale.total || 0).toFixed(2)}`;
    }

    async function printReceiptNow() {
      try {
        const result = await window.api.printReceipt();

        if (result?.success) {
          alert("Receipt printed successfully" + (result.printer ? " on " + result.printer : ""));
          return;
        }

        if (result?.canceled) return;

        alert(result?.message || "Printing failed");
      } catch (error) {
        console.error("printReceipt error:", error);
        alert("Printing failed");
      }
    }

    printBtn.addEventListener("click", printReceiptNow);
  </script>
</body>
</html>
